<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaca-Apps</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="title">
            <h1>Wheater Apps</h1>
            <p>cek cuaca hari ini</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="display-input">
                <input type="text" id="input-city" placeholder="Masukkan Nama Kota Anda">
                <button type="button" id="search-box">Cari</button>
            </div>

            <div class="display-result" id="weather-display">
                <h2 id="city-name"></h2>
                <div id="weather-icon" class="display-icon"></div>
                <p id="weather-desc"></p>
            </div>
        </div>

        <script src="js/script.js"></script>

        <!-- <a href="https://www.flaticon.com/free-icons/cloud" title="cloud icons">Cloud icons created by kosonicon - Flaticon</a> -->
    </main>
</body>
</html>
